<!DOCTYPE html>
<html>
  <head>
    <title>Page Not Found - SunLife Demo</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        margin: 0;
        padding: 2rem;
        background: linear-gradient(135deg, #00427a 0%, #1a5fa5 100%);
        color: white;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .container {
        text-align: center;
        max-width: 600px;
      }
      h1 {
        font-size: 4rem;
        margin: 0 0 1rem 0;
      }
      p {
        font-size: 1.25rem;
        margin-bottom: 2rem;
      }
      a {
        display: inline-block;
        padding: 1rem 2rem;
        background-color: #f39200;
        color: white;
        text-decoration: none;
        border-radius: 4px;
        font-weight: 600;
        transition: background-color 0.3s ease;
      }
      a:hover {
        background-color: #d67600;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>404</h1>
      <p>Page not found</p>
      <p>The page you're looking for doesn't exist.</p>
      <a href="/">Return to Home</a>
    </div>
  </body>
</html>
